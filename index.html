<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD TERMINAL VVIP | REAL-TIME</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0f141d;
            --accent-color: #00ffcc;
            --vvip-color: #ffd700;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --success: #00c805;
            --input-bg: #1a212e;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        /* Login System */
        #password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #password-overlay input { padding: 15px; width: 280px; border-radius: 8px; border: 1px solid var(--accent-color); background: #111; color: #fff; text-align: center; font-size: 1.1em; outline: none; margin-bottom: 10px; }
        #password-overlay button { padding: 12px 30px; border-radius: 8px; border: none; background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer; width: 280px; margin-bottom: 10px; }
        .btn-free { background: #333 !important; color: #fff !important; }

        header { padding: 10px 20px; background: var(--card-bg); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .logo { font-weight: 800; letter-spacing: 2px; color: var(--accent-color); font-size: 1.2rem; }
        .status-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        .container { display: grid; grid-template-columns: 1fr 380px; gap: 15px; padding: 15px; min-height: calc(100vh - 85px); box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; position: relative; }
        h2 { font-size: 0.8rem; color: var(--accent-color); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Protection */
        .locked-feature { filter: blur(15px); pointer-events: none; user-select: none; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 12px; text-align: center; }
        
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; }
        .input-group input { width: 100%; background: var(--input-bg); border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; font-size: 0.85rem; box-sizing: border-box; }
        .result-box { background: rgba(0, 255, 204, 0.05); border: 1px dashed var(--accent-color); padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; }
        
        .btn-wa { display: block; width: 100%; padding: 12px; text-align: center; background: var(--success); color: white; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 10px; font-size: 0.85rem; }

        /* Chat initially hidden */
        #card-chat { display: none; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>

    <div id="password-overlay">

                </div>
