<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ANALYTICS | FREE vs VVIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0f141d;
            --accent-color: #00ffcc;
            --vvip-color: #ffd700; /* Warna Emas untuk VVIP */
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --danger: #ff4d4d;
            --success: #00c805;
            --input-bg: #1a212e;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        /* Login Overlay */
        #password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #password-overlay input { padding: 15px; width: 280px; border-radius: 8px; border: 1px solid var(--accent-color); background: #111; color: #fff; text-align: center; font-size: 1.1em; outline: none; margin-bottom: 10px; }
        #password-overlay button { padding: 12px 30px; border-radius: 8px; border: none; background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer; width: 280px; margin-bottom: 10px; }
        .btn-free { background: #333 !important; color: #fff !important; }

        header { padding: 10px 20px; background: var(--card-bg); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .logo { font-weight: 800; letter-spacing: 2px; color: var(--accent-color); font-size: 1.2rem; }
        .status-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        .container { display: grid; grid-template-columns: 1fr 380px; gap: 15px; padding: 15px; min-height: calc(100vh - 85px); box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; position: relative; }
        h2 { font-size: 0.8rem; color: var(--accent-color); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Fitur Terkunci untuk User Gratis */
        .locked-feature { filter: blur(8px); pointer-events: none; user-select: none; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 12px; text-align: center; padding: 20px; box-sizing: border-box; }
        .lock-icon { font-size: 2rem; margin-bottom: 10px; }

        /* Calculator & Chat Styling */
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; background: var(--input-bg); border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; font-size: 0.85rem; outline: none; box-sizing: border-box; }
        .result-box { background: rgba(0, 255, 204, 0.05); border: 1px dashed var(--accent-color); padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; }
        .btn-wa { display: block; width: 100%; padding: 12px; text-align: center; background: var(--success); color: white; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 10px; font-size: 0.85rem; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="logo" style="font-size: 2rem; margin-bottom: 10px;">TRADING TERMINAL</div>
        <p style="color: var(--text-dim); margin-bottom: 25px;">Pilih Akses Terminal Anda</p>
        <input type="text" id="passInput" placeholder="Masukkan Kode VVIP (Opsional)">
        <button onclick="checkAccess('VVIP')">MASUK SEBAGAI VVIP</button>
        <button onclick="checkAccess('FREE')" class="btn-free">MASUK GRATIS (LIMITED)</button>
    </div>

    <header>
        <div class="logo">TERMINAL ANALYTICS <span id="user-status" class="status-badge"></span></div>
        <div id="clock" style="color:var(--accent-color); font-weight: bold; font-family: monospace;">00:00:00</div>
    </header>

    <main class="container">
        <div class="left-col">
            <div class="card" style="height: 800px;">
                <h2>📊 Live Terminal View - XAUUSD</h2>
                <div id="tradingview_chart" style="height: calc(100% - 30px);"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="card" id="card-calc">
                <h2>🧮 Smart Risk Calculator</h2>
                <div class="vvip-content">
                    <div class="calc-grid">
                        <div class="input-group"><label>Balance</label><input type="number" id="balance" value="1000" oninput="calculateLot()"></div>
                        <div class="input-group"><label>Risk %</label><input type="number" id="riskPercent" value="1" step="0.1" oninput="calculateLot()"></div>
                        <div class="input-group"><label>SL Pips</label><input type="number" id="slPips" value="30" oninput="calculateLot()"></div>
                        <div class="input-group"><label>Currency</label>
                            <select id="currency" onchange="calculateLot()"><option value="USD">USD</option><option value="USC">USC</option><option value="IDR">IDR</option></select>
                        </div>
                    </div>
                    <div class="result-box"><span id="lotResult" style="font-size:1.5rem; font-weight:800; color:var(--accent-color);">0.03</span></div>
                </div>
            </div>

            <div class="card" id="card-chat" style="height: 350px;">
                <h2>💬 VVIP Sharing Room</h2>
                <div class="vvip-content" style="height: 100%;">
                    <iframe src="https://www3.cbox.ws/box/?boxid=3534570&boxtag=z8p4m6" width="100%" height="90%" frameborder="0" scrolling="auto" style="border-radius: 8px;"></iframe>
                </div>
            </div>

            <div class="card" id="card-signal">
                <h2>⚡ AI Auto-Signal (1M)</h2>
                <div class="vvip-content">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "1m", "width": "100%", "isTransparent": true, "height": "200", "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "id", "colorTheme": "dark" }
                        </script>
                    </div>
                    <a href="https://wa.me/62812345678" class="btn-wa">UPGRADE KE VVIP</a>
                </div>
            </div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // DAFTAR KODE VVIP ANDA
        const vvipCodes = ["ADMIN123", "VIP_REY", "SUKSES77"];

        function checkAccess(type) {
            const input = document.getElementById("passInput").value.toUpperCase();
            const statusBadge = document.getElementById("user-status");

            if (type === 'VVIP') {
                if (vvipCodes.includes(input)) {
                    document.getElementById("password-overlay").style.display = "none";
                    statusBadge.innerText = "VVIP MEMBER";
                    statusBadge.style.background = "var(--vvip-color)";
                    statusBadge.style.color = "#000";
                    loadChart();
                } else {
                    alert("Kode VVIP Salah atau Tidak Terdaftar!");
                }
            } else {
                // AKSES GRATIS
                document.getElementById("password-overlay").style.display = "none";
                statusBadge.innerText = "FREE USER";
                statusBadge.style.background = "#555";
                statusBadge.style.color = "#fff";
                
                // Kunci Fitur
                lockFeature("card-calc");
                lockFeature("card-chat");
                lockFeature("card-signal");
                loadChart();
            }
        }

        function lockFeature(id) {
            const card = document.getElementById(id);
            const content = card.querySelector(".vvip-content");
            content.classList.add("locked-feature");
            
            const overlay = document.createElement("div");
            overlay.className = "lock-overlay";
            overlay.innerHTML = `<div class="lock-icon">🔒</div><div style="color:var(--vvip-color); font-weight:bold; font-size:0.7rem;">KHUSUS VVIP MEMBER</div><a href="https://wa.me/62812345678" style="font-size:0.6rem; color:#fff; text-decoration:underline; margin-top:5px;">Klik untuk Upgrade</a>`;
            card.appendChild(overlay);
        }

        function calculateLot() {
            const b = parseFloat(document.getElementById('balance').value) || 0;
            const r = parseFloat(document.getElementById('riskPercent').value) || 0;
            const s = parseFloat(document.getElementById('slPips').value) || 0;
            if (b > 0 && r > 0 && s > 0) {
                const lot = (b * (r/100)) / (s * 10);
                document.getElementById('lotResult').innerText = lot.toFixed(2);
            }
        }

        function loadChart() {
            new TradingView.widget({
                "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "H1", "timezone": "Asia/Jakarta", "theme": "dark", "style": "1", "locale": "id", "container_id": "tradingview_chart"
            });
        }

        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString('id-ID'); }, 1000);
    </script>
</body>
</html>
